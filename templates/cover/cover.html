<!DOCTYPE html>
<!--
  Brandless dark dataset cover. 1200x630. Community, unofficial, Apache-2.0.
  Reusable by anyone. Replace the PLACEHOLDER text. Remove unused stat tiles.
  Render to PNG with the snippet in cover/README.md.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg-top: #0c1116;
    --bg-bottom: #161d27;
    --ink: #f2f5f8;
    --muted: #9aa7b4;
    --line: #2a3340;
    --tile: #1b232e;
    --accent: #5b9dd9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    width: 1200px;
    height: 630px;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top { display: flex; flex-direction: column; gap: 22px; }
  .eyebrow {
    font-size: 22px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .accent-bar {
    width: 88px;
    height: 6px;
    border-radius: 3px;
    background: var(--accent);
  }
  .title {
    font-size: 78px;
    line-height: 1.04;
    font-weight: 700;
    letter-spacing: -0.01em;
    max-width: 980px;
  }
  .subtitle {
    font-size: 30px;
    line-height: 1.3;
    color: var(--muted);
    font-weight: 400;
    max-width: 900px;
  }
  .stats {
    display: flex;
    gap: 20px;
  }
  .tile {
    flex: 1;
    background: var(--tile);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px 26px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tile .value {
    font-size: 40px;
    font-weight: 700;
    color: var(--ink);
  }
  .tile .label {
    font-size: 17px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top">
      <div class="eyebrow">PLACEHOLDER EYEBROW</div>
      <div class="accent-bar"></div>
      <div class="title">PLACEHOLDER Title Goes Here</div>
      <div class="subtitle">PLACEHOLDER subtitle. One line describing the dataset or model.</div>
    </div>

    <!-- Stat tiles: keep up to four, delete the ones you do not need. -->
    <div class="stats">
      <div class="tile">
        <div class="value">PLACEHOLDER</div>
        <div class="label">PLACEHOLDER label</div>
      </div>
      <div class="tile">
        <div class="value">PLACEHOLDER</div>
        <div class="label">PLACEHOLDER label</div>
      </div>
      <div class="tile">
        <div class="value">PLACEHOLDER</div>
        <div class="label">PLACEHOLDER label</div>
      </div>
      <div class="tile">
        <div class="value">PLACEHOLDER</div>
        <div class="label">PLACEHOLDER label</div>
      </div>
    </div>
  </div>
</body>
</html>
